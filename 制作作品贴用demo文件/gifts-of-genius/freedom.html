<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自由空间 - 天才的遗赠 / Gifts of Genius</title>
    <link rel="stylesheet" href="_shared/css/common.css">
    <style>
        body { padding-top: 60px; overflow-x: hidden; }

        /* Freedom page: more transparent nav to blend with cosmos */
        .nav {
            background: rgba(245, 240, 232, 0.45);
            backdrop-filter: blur(6px);
        }

        /* ========== 星空场景容器 ========== */
        .cosmos-scene {
            position: relative;
            min-height: calc(100vh - 60px);
            background: linear-gradient(180deg, #1a2535 0%, #1e2d40 40%, #25364d 100%);
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* 场景底部星云 + 渐变过渡 */
        .cosmos-scene::before {
            content: '';
            position: absolute;
            bottom: 0; left: 0; right: 0;
            height: 60%;
            background:
                linear-gradient(to top, #f5f0e8 0%, rgba(245, 240, 232, 0.85) 8%, rgba(245, 240, 232, 0.5) 18%, rgba(200, 195, 185, 0.15) 30%, transparent 45%),
                radial-gradient(ellipse at 20% 85%, rgba(74, 124, 89, 0.06) 0%, transparent 60%),
                radial-gradient(ellipse at 75% 80%, rgba(196, 165, 90, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: 0;
        }

        /* 场景标题 */
        .cosmos-header {
            position: relative;
            z-index: 10;
            text-align: center;
            padding: 2rem 2rem 0.5rem;
        }
        .cosmos-header h1 {
            font-size: 1.6rem;
            letter-spacing: 0.25em;
            color: rgba(220, 215, 200, 0.85);
            font-weight: 400;
        }
        .cosmos-header .subtitle {
            font-size: 0.78rem;
            color: rgba(196, 165, 90, 0.5);
            letter-spacing: 0.12em;
            margin-top: 0.4rem;
        }
        /* 左上角返回按钮 */
        .scene-back-btn {
            position: absolute;
            top: 1rem;
            left: 1rem;
            z-index: 50;
            background: rgba(30, 45, 64, 0.7);
            border: 1px solid rgba(196, 165, 90, 0.25);
            border-radius: 50%;
            color: rgba(196, 165, 90, 0.9);
            font-size: 1.1rem;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            line-height: 1;
            text-decoration: none;
        }
        .scene-back-btn:hover {
            background: rgba(196, 165, 90, 0.15);
            border-color: rgba(196, 165, 90, 0.5);
        }

        .cosmos-header-actions {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            display: flex;
            gap: 0.5rem;
            z-index: 20;
        }
        .header-action-btn {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(196, 165, 90, 0.1);
            border: 1px solid rgba(196, 165, 90, 0.2);
            color: rgba(196, 165, 90, 0.7);
            font-size: 1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            padding: 0;
            line-height: 1;
            text-decoration: none;
        }
        .header-action-btn:hover {
            background: rgba(196, 165, 90, 0.2);
            border-color: rgba(196, 165, 90, 0.4);
            color: rgba(220, 210, 180, 0.95);
            transform: scale(1.05);
        }

        /* 筛选标签栏 */
        .cosmos-tags {
            position: relative;
            z-index: 10;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 0.8rem 2rem;
        }
        .cosmos-tag {
            padding: 0.3rem 0.9rem;
            border: 1px solid rgba(196, 165, 90, 0.2);
            border-radius: 20px;
            background: rgba(196, 165, 90, 0.06);
            color: rgba(196, 165, 90, 0.65);
            font-size: 0.72rem;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            letter-spacing: 0.08em;
        }
        .cosmos-tag:hover {
            border-color: rgba(196, 165, 90, 0.5);
            color: rgba(196, 165, 90, 0.9);
            background: rgba(196, 165, 90, 0.12);
        }
        .cosmos-tag.active {
            background: rgba(196, 165, 90, 0.2);
            border-color: rgba(196, 165, 90, 0.6);
            color: rgba(220, 210, 180, 0.95);
            box-shadow: 0 0 12px rgba(196, 165, 90, 0.15);
        }

        /* 星空画布 */
        .cosmos-field {
            position: relative;
            z-index: 5;
            flex: 1;
            min-height: 500px;
        }

        /* ========== 光点（可交互的星星） ========== */
        .light-point {
            position: absolute;
            width: var(--size, 10px);
            height: var(--size, 10px);
            cursor: pointer;
            transition: transform 0.3s;
            z-index: 10;
        }
        .light-point svg {
            width: 100%;
            height: 100%;
            display: block;
        }
        .light-point:hover {
            transform: scale(1.6);
        }

        /* 光点颜色分类 */
        .light-point.tag-\u751F\u6B7B\u89C2 { --base-color: rgba(180, 140, 120, 0.8); --glow-color: rgba(180, 140, 120, 0.2); }
        .light-point.tag-\u81EA\u7531 { --base-color: rgba(120, 200, 160, 0.8); --glow-color: rgba(120, 200, 160, 0.2); }
        .light-point.tag-\u8BA4\u77E5 { --base-color: rgba(140, 170, 220, 0.8); --glow-color: rgba(140, 170, 220, 0.2); }
        .light-point.tag-\u8D23\u4EFB { --base-color: rgba(220, 180, 100, 0.8); --glow-color: rgba(220, 180, 100, 0.2); }
        .light-point.tag-\u9006\u5883 { --base-color: rgba(220, 120, 100, 0.8); --glow-color: rgba(220, 120, 100, 0.2); }
        .light-point.tag-\u51B3\u7B56 { --base-color: rgba(180, 160, 220, 0.8); --glow-color: rgba(180, 160, 220, 0.2); }
        .light-point.tag-\u5176\u4ED6 { --base-color: rgba(200, 200, 200, 0.7); --glow-color: rgba(200, 200, 200, 0.15); }
        .light-point.tag-\u7528\u6237 { --base-color: rgba(196, 165, 90, 0.9); --glow-color: rgba(196, 165, 90, 0.25); }

        /* 四角星颜色（用于 SVG fill） */
        :root {
            --star-\u751F\u6B7B\u89C2: rgba(200, 160, 140, 0.9);
            --star-\u81EA\u7531: rgba(140, 220, 180, 0.9);
            --star-\u8BA4\u77E5: rgba(160, 190, 240, 0.9);
            --star-\u8D23\u4EFB: rgba(240, 200, 120, 0.9);
            --star-\u9006\u5883: rgba(240, 140, 120, 0.9);
            --star-\u51B3\u7B56: rgba(200, 180, 240, 0.9);
            --star-\u5176\u4ED6: rgba(220, 220, 220, 0.85);
            --star-\u7528\u6237: rgba(220, 185, 110, 0.95);
        }

        /* 光点呼吸动画（随机延迟） */
        @keyframes breathe {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        .light-point.alive {
            animation: breathe var(--dur, 3s) ease-in-out var(--delay, 0s) infinite;
        }
        .light-point.hidden {
            opacity: 0 !important;
            pointer-events: none;
            transition: opacity 0.6s;
            animation: none !important;
        }

        /* 背景装饰星（不可交互） — 十字闪烁星光 */
        .bg-star {
            position: absolute;
            pointer-events: none;
            z-index: 1;
            background: rgba(220, 215, 200, 0.5);
            border-radius: 50%;
        }
        .bg-star.bright {
            background: rgba(240, 235, 210, 0.7);
            box-shadow: 0 0 4px rgba(220, 215, 200, 0.3);
        }
        .bg-star.twinkle {
            animation: starTwinkle var(--dur, 3s) ease-in-out infinite alternate;
        }
        @keyframes starTwinkle {
            0% { opacity: 0.3; }
            100% { opacity: 1; }
        }

        /* ========== 点击后的金句弹窗 ========== */
        .quote-reveal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 1000;
            opacity: 0;
            transition: opacity 0.35s ease;
        }
        .quote-reveal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
        }
        .quote-reveal-card {
            position: relative;
            width: 90%;
            max-width: 520px;
            background: linear-gradient(135deg, rgba(35, 50, 70, 0.98), rgba(40, 55, 75, 0.98));
            border: 1px solid rgba(196, 165, 90, 0.2);
            border-radius: 16px;
            padding: 2.5rem 2rem 2rem;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(196, 165, 90, 0.05);
            transform: scale(0.9);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.4s;
        }
        .quote-reveal-overlay.active .quote-reveal-card {
            transform: scale(1);
            opacity: 1;
        }
        .quote-reveal-card::before {
            content: '\201C';
            position: absolute;
            top: 0.8rem;
            left: 1.5rem;
            font-size: 4rem;
            color: rgba(196, 165, 90, 0.12);
            font-family: Georgia, serif;
            line-height: 1;
        }
        .quote-reveal-text {
            font-size: 1.15rem;
            line-height: 2.1;
            color: rgba(230, 225, 210, 0.92);
            letter-spacing: 0.03em;
            margin-bottom: 1.2rem;
            position: relative;
            z-index: 1;
        }
        .quote-reveal-source {
            font-size: 0.82rem;
            color: rgba(196, 165, 90, 0.55);
            letter-spacing: 0.06em;
            margin-bottom: 1rem;
        }
        .quote-reveal-tag {
            display: inline-block;
            font-size: 0.68rem;
            padding: 0.2rem 0.6rem;
            border-radius: 12px;
            background: rgba(196, 165, 90, 0.12);
            color: rgba(196, 165, 90, 0.7);
            letter-spacing: 0.05em;
        }
        .quote-reveal-actions {
            display: flex;
            gap: 1rem;
            margin-top: 1.2rem;
            align-items: center;
        }
        .reveal-action-btn {
            background: none;
            border: 1px solid rgba(196, 165, 90, 0.2);
            color: rgba(196, 165, 90, 0.65);
            padding: 0.4rem 0.9rem;
            border-radius: 6px;
            font-size: 0.78rem;
            cursor: pointer;
            transition: all 0.25s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .reveal-action-btn:hover {
            border-color: rgba(196, 165, 90, 0.5);
            color: rgba(196, 165, 90, 0.95);
            background: rgba(196, 165, 90, 0.08);
        }
        .reveal-action-btn.liked {
            color: rgba(220, 160, 120, 0.9);
            border-color: rgba(220, 160, 120, 0.4);
        }
        .quote-reveal-close {
            position: absolute;
            top: 1rem;
            right: 1.2rem;
            background: none;
            border: 1px solid rgba(196, 165, 90, 0.15);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            color: rgba(196, 165, 90, 0.5);
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.25s;
            padding: 0;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .quote-reveal-close:hover {
            color: rgba(196, 165, 90, 0.9);
            border-color: rgba(196, 165, 90, 0.4);
            background: rgba(196, 165, 90, 0.1);
        }
        .reveal-delete-btn {
            margin-left: auto;
            background: none;
            border: none;
            color: rgba(196, 165, 90, 0.3);
            font-size: 0.72rem;
            cursor: pointer;
            font-family: inherit;
            transition: color 0.2s;
        }
        .reveal-delete-btn:hover {
            color: rgba(220, 120, 100, 0.8);
        }

        /* ========== 下方内容区 ========== */
        .freedom-sections {
            background: var(--paper, #f5f0e8);
            padding-bottom: 4rem;
        }
        .freedom-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 2.5rem 2rem 0;
        }
        .freedom-section-title {
            font-size: 1.25rem;
            letter-spacing: 0.15em;
            color: var(--ink, #1a1a1a);
            margin-bottom: 0.3rem;
            position: relative;
            padding-left: 1rem;
        }
        .freedom-section-title::before {
            content: '';
            position: absolute;
            left: 0;
            top: 0.15em;
            width: 4px;
            height: 1.2em;
            border-radius: 2px;
        }
        .freedom-section-title.accent-bamboo::before { background: var(--bamboo, #4a7c59); }
        .freedom-section-title.accent-gold::before { background: #c4a55a; }
        .freedom-section-title.accent-rose::before { background: #c47a5a; }
        .freedom-section-subtitle {
            font-size: 0.82rem;
            color: var(--mist, #9e9a94);
            margin-bottom: 1.5rem;
            padding-left: 1rem;
            letter-spacing: 0.05em;
        }

        /* 添加话语区 */
        .add-quote-box {
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(139, 115, 85, 0.15);
            border-radius: 12px;
            padding: 1.8rem 1.5rem;
        }
        .add-quote-box textarea {
            width: 100%;
            min-height: 70px;
            padding: 0.8rem 1rem;
            border: 1.5px solid rgba(139, 115, 85, 0.2);
            border-radius: 8px;
            background: rgba(245, 240, 232, 0.5);
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--ink, #1a1a1a);
            line-height: 1.8;
            resize: vertical;
            transition: border-color 0.2s;
            box-sizing: border-box;
        }
        .add-quote-box textarea:focus {
            outline: none;
            border-color: var(--bamboo, #4a7c59);
        }
        .add-quote-box textarea::placeholder {
            color: var(--mist-light, #c4bfb6);
        }
        .add-quote-row {
            display: flex;
            gap: 0.6rem;
            margin-top: 0.8rem;
        }
        .add-quote-row select,
        .add-quote-row input {
            flex: 1;
            padding: 0.55rem 0.8rem;
            border: 1.5px solid rgba(139, 115, 85, 0.2);
            border-radius: 8px;
            background: rgba(245, 240, 232, 0.5);
            font-family: inherit;
            font-size: 0.85rem;
            color: var(--ink, #1a1a1a);
            transition: border-color 0.2s;
        }
        .add-quote-row select:focus,
        .add-quote-row input:focus {
            outline: none;
            border-color: var(--bamboo, #4a7c59);
        }
        .add-quote-row input::placeholder {
            color: var(--mist-light, #c4bfb6);
        }
        .add-quote-actions {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-top: 1rem;
        }
        .section-submit-btn {
            padding: 0.6rem 1.8rem;
            background: var(--bamboo, #4a7c59);
            color: #fff;
            border: none;
            border-radius: 8px;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            cursor: pointer;
            font-family: inherit;
            transition: background 0.2s, transform 0.15s;
        }
        .section-submit-btn:hover {
            background: var(--bamboo-light, #5d9a6e);
        }
        .section-submit-btn:active {
            transform: scale(0.97);
        }
        .section-submit-btn:disabled {
            background: var(--mist-light, #c4bfb6);
            cursor: pointer;
            transform: none;
        }
        .section-submit-btn.btn-disabled {
            background: var(--mist-light, #c4bfb6) !important;
            opacity: 0.6;
            cursor: pointer;
            transform: none;
        }
        .section-submit-btn.btn-gold {
            background: #c4a55a;
        }
        .section-submit-btn.btn-gold:hover {
            background: #d4b56a;
        }
        .section-submit-btn.btn-rose {
            background: #c47a5a;
        }
        .section-submit-btn.btn-rose:hover {
            background: #d48a6a;
        }
        .section-hint {
            font-size: 0.75rem;
            color: var(--mist, #9e9a94);
        }

        /* 选择列表 */
        .choice-list {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
            margin-bottom: 1.5rem;
        }
        .choice-item {
            display: flex;
            align-items: center;
            gap: 0.8rem;
            padding: 1rem 1.2rem;
            background: rgba(255, 255, 255, 0.7);
            border: 2px solid rgba(139, 115, 85, 0.1);
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.25s;
        }
        .choice-item:hover {
            border-color: rgba(139, 115, 85, 0.3);
            background: rgba(255, 255, 255, 0.9);
        }
        .choice-item.selected {
            border-color: var(--bamboo, #4a7c59);
            background: rgba(74, 124, 89, 0.06);
        }
        .choice-item.selected .choice-radio {
            border-color: var(--bamboo, #4a7c59);
            background: var(--bamboo, #4a7c59);
        }
        .choice-item.selected .choice-radio::after {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: #fff;
        }
        .choice-radio {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid rgba(139, 115, 85, 0.3);
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }
        .choice-content { flex: 1; }
        .choice-label {
            font-size: 0.95rem;
            font-weight: 700;
            color: var(--ink, #1a1a1a);
            letter-spacing: 0.05em;
        }
        .choice-desc {
            font-size: 0.8rem;
            color: var(--mist, #9e9a94);
            margin-top: 0.2rem;
            line-height: 1.6;
        }
        .choice-vs {
            font-size: 0.7rem;
            color: var(--bamboo, #4a7c59);
            font-weight: 700;
            letter-spacing: 0.08em;
            flex-shrink: 0;
        }
        .choice-plus {
            font-size: 0.7rem;
            color: #c4a55a;
            font-weight: 700;
            letter-spacing: 0.08em;
            flex-shrink: 0;
        }

        /* 复选框样式 */
        .choice-checkbox {
            width: 18px;
            height: 18px;
            border: 2px solid rgba(139, 115, 85, 0.3);
            border-radius: 4px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            background: rgba(255, 255, 255, 0.5);
        }
        .choice-item.selected .choice-checkbox {
            border-color: var(--bamboo, #4a7c59);
            background: var(--bamboo, #4a7c59);
        }
        .choice-item.selected .choice-checkbox::after {
            content: '\2713';
            color: #fff;
            font-size: 12px;
            font-weight: 700;
            line-height: 1;
        }
        .choice-item.disabled {
            opacity: 0.4;
            cursor: pointer;
        }

        /* 双按钮行 */
        .combo-btn-row {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            align-items: center;
            flex-wrap: wrap;
        }
        .combo-btn-row .section-submit-btn {
            flex: 1;
            min-width: 140px;
        }
        .combo-btn-hint {
            font-size: 0.75rem;
            color: var(--mist, #9e9a94);
            width: 100%;
            margin-top: 0.3rem;
        }

        /* 对话展示区 */
        .dialogue-display {
            display: none;
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(139, 115, 85, 0.12);
            border-radius: 12px;
        }
        .dialogue-display.active {
            display: block;
        }
        .dialogue-display-title {
            font-size: 0.75rem;
            color: var(--bamboo, #4a7c59);
            letter-spacing: 0.12em;
            margin-bottom: 1rem;
        }
        .dialogue-msg-block {
            margin-bottom: 1rem;
        }
        .dialogue-msg-block:last-child {
            margin-bottom: 0;
        }
        .dialogue-speaker {
            font-size: 0.78rem;
            font-weight: 700;
            color: var(--bamboo, #4a7c59);
            margin-bottom: 0.2rem;
        }
        .dialogue-speaker.speaker-b {
            color: #c4a55a;
        }
        .dialogue-text {
            font-size: 0.9rem;
            color: var(--ink, #1a1a1a);
            line-height: 1.9;
            padding-left: 0.5rem;
            border-left: 2px solid rgba(74, 124, 89, 0.2);
        }
        .dialogue-speaker.speaker-b + .dialogue-text {
            border-left-color: rgba(196, 165, 90, 0.3);
        }

        /* 组合展示区 */
        .combo-display {
            display: none;
            margin-top: 1.5rem;
            padding: 1.5rem;
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(139, 115, 85, 0.12);
            border-radius: 12px;
        }
        .combo-display.active {
            display: block;
        }
        .combo-display-title {
            font-size: 0.75rem;
            color: #c4a55a;
            letter-spacing: 0.12em;
            margin-bottom: 1rem;
        }
        .combo-display-text {
            font-size: 0.92rem;
            color: var(--ink, #1a1a1a);
            line-height: 2;
        }

        /* 分隔线 */
        .section-divider {
            max-width: 900px;
            margin: 0 auto;
            padding: 2rem 2rem 0;
        }
        .section-divider hr {
            border: none;
            height: 1px;
            background: rgba(139, 115, 85, 0.12);
        }

        /* ========== Toast ========== */
        .toast {
            position: fixed;
            bottom: 2rem;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(40, 50, 70, 0.95);
            color: rgba(220, 215, 200, 0.85);
            padding: 0.6rem 1.3rem;
            border-radius: 8px;
            font-size: 0.82rem;
            letter-spacing: 0.05em;
            border: 1px solid rgba(196, 165, 90, 0.15);
            opacity: 0;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 5000;
            pointer-events: none;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        /* ========== 收藏面板（居中modal） ========== */
        .fav-modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.35s ease;
        }
        .fav-modal-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
        }
        .fav-modal {
            position: relative;
            width: 90%;
            max-width: 520px;
            max-height: 80vh;
            background: linear-gradient(135deg, rgba(35, 50, 70, 0.98), rgba(40, 55, 75, 0.98));
            border: 1px solid rgba(196, 165, 90, 0.2);
            border-radius: 16px;
            padding: 0;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), 0 0 40px rgba(196, 165, 90, 0.05);
            transform: scale(0.9);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.4s;
            display: flex;
            flex-direction: column;
        }
        .fav-modal-overlay.active .fav-modal {
            transform: scale(1);
            opacity: 1;
        }
        .fav-modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 1.5rem 1rem;
            border-bottom: 1px solid rgba(196, 165, 90, 0.12);
        }
        .fav-modal-header h2 {
            font-size: 1rem;
            letter-spacing: 0.2em;
            color: rgba(196, 165, 90, 0.85);
        }
        .fav-modal-close {
            background: none;
            border: 1px solid rgba(196, 165, 90, 0.2);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 1.1rem;
            cursor: pointer;
            color: rgba(196, 165, 90, 0.5);

            padding: 0;

        .fav-modal-close:hover {

        .fav-list {

        .fav-item {

        /* ========== 响应式 ========== */
        @media (max-width: 768px) {
            .cosmos-header h1 { font-size: 1.2rem; }

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <script>
        // ==================== 金句数据 ====================
        var defaultQuotes = [
            { id: 'q1', text: '\u201C人固有死，或重于泰山，或轻于鸿毛。\u201D', source: '司马迁《报任安书》', tag: '生死观', likes: 0, liked: false, fav: false, isUser: false },
            { id: 'q2', text: '\u201C生当作人杰，死亦为鬼雄。\u201D', source: '李清照《夏日绝句》', tag: '生死观', likes: 0, liked: false, fav: false, isUser: false },
            { id: 'q3', text: '\u201C不自由，毋宁死。\u201D', source: '帕特里克·亨利', tag: '自由', likes: 0, liked: false, fav: false, isUser: false },
            { id: 'q4', text: '\u201C未经审视的人生不值得过。\u201D', source: '苏格拉底', tag: '认知', likes: 0, liked: false, fav: false, isUser: false },
            { id: 'q5', text: '\u201C人生而自由的，却无往不在枷锁之中。\u201D', source: '卢梭《社会契约论》', tag: '自由', likes: 0, liked: false, fav: false, isUser: false },
            { id: 'q6', text: '\u201C吾生也有涯，而知也无涯。\u201D', source: '庄子《养生主》', tag: '认知', likes: 0, liked: false, fav: false, isUser: false },
            { id: 'q7', text: '\u201C天下兴亡，匹夫有责。\u201D', source: '顾炎武', tag: '责任', likes: 0, liked: false, fav: false, isUser: false },
            { id: 'q8', text: '\u201C我思故我在。\u201D', source: '笛卡尔', tag: '认知', likes: 0, liked: false, fav: false, isUser: false },
            { id: 'q10', text: '\u201C凡是不能杀死你的，终将使你更强大。\u201D', source: '尼采', tag: '逆境', likes: 0, liked: false, fav: false, isUser: false },
            { id: 'q11', text: '\u201C大家都知道，物质财富是可以继承的，精神财富也同样。\u201D', source: '《天才的遗赠》作者 行愿', tag: '其他', likes: 0, liked: false, fav: false, isUser: false, isEasterEgg: true }
        ];

        // ==================== 状态 ====================
        var activeTag = 'all';
        var allQuotes = [];
        var currentRevealId = null;
        var quotesKey = 'gifts_of_genius_user_quotes';
        var likesKey = 'gifts_of_genius_quote_likes';

        function loadState() {
            try {
                var userQuotes = JSON.parse(localStorage.getItem(quotesKey) || '[]');
                var likes = JSON.parse(localStorage.getItem(likesKey) || '{}');
                return { userQuotes: userQuotes, likes: likes };
            } catch (e) {
                return { userQuotes: [], likes: {} };
            }
        }
        function saveLikes(likes) {
            try { localStorage.setItem(likesKey, JSON.stringify(likes)); } catch (e) {}
        }
        function saveUserQuotes(quotes) {
            try { localStorage.setItem(quotesKey, JSON.stringify(quotes)); } catch (e) {}
        }

        // ==================== 初始化 ====================
        function init() {
            var state = loadState();
            allQuotes = defaultQuotes.map(function(q) {
                return {
                    id: q.id, text: q.text, source: q.source, tag: q.tag,
                    likes: (state.likes[q.id] && state.likes[q.id].count) || 0,
                    liked: (state.likes[q.id] && state.likes[q.id].liked) || false,
                    fav: (state.likes[q.id] && state.likes[q.id].fav) || false,
                    isUser: false,
                    isEasterEgg: q.isEasterEgg || false
                };
            });
            state.userQuotes.forEach(function(uq) {
                allQuotes.push({
                    id: uq.id, text: uq.text, source: uq.source, tag: uq.tag,
                    likes: (state.likes[uq.id] && state.likes[uq.id].count) || 0,
                    liked: (state.likes[uq.id] && state.likes[uq.id].liked) || false,
                    fav: (state.likes[uq.id] && state.likes[uq.id].fav) || false,
                    isUser: true
                });
            });
            renderTags();
            renderField();
        }

        // ==================== 筛选标签 ====================
        function renderTags() {
            var tags = ['all'];
            allQuotes.forEach(function(q) {
                if (tags.indexOf(q.tag) === -1) tags.push(q.tag);
            });
            var container = document.getElementById('cosmosTags');
            container.innerHTML = '';
            tags.forEach(function(tag) {
                var btn = document.createElement('button');
                btn.className = 'cosmos-tag' + (tag === activeTag ? ' active' : '');
                btn.textContent = tag === 'all' ? '全部' : tag;
                btn.setAttribute('data-tag', tag);
                btn.addEventListener('click', function() {
                    activeTag = tag;
                    document.querySelectorAll('.cosmos-tag').forEach(function(b) {
                        b.classList.toggle('active', b.getAttribute('data-tag') === tag);
                    });
                    filterPoints();
                });
                container.appendChild(btn);
            });
        }

        // ==================== 渲染星空 ====================
        function renderField() {
            var field = document.getElementById('cosmosField');
            // 先清除旧的光点（保留背景星）
            field.querySelectorAll('.light-point').forEach(function(el) { el.remove(); });

            // 渲染背景装饰星
            var existingBg = field.querySelectorAll('.bg-star').length;
            if (existingBg < 80) {
                for (var i = existingBg; i < 80; i++) {
                    var isBright = Math.random() > 0.7;
                    var isTwinkle = Math.random() > 0.5;
                    var star = document.createElement('div');
                    star.className = 'bg-star' + (isBright ? ' bright' : '') + (isTwinkle ? ' twinkle' : '');
                    star.style.top = (Math.random() * 100) + '%';
                    star.style.left = (Math.random() * 100) + '%';
                    star.style.opacity = (0.2 + Math.random() * 0.6);
                    if (isBright) {
                        star.style.width = '3px';
                        star.style.height = '3px';
                    } else {
                        star.style.width = (1 + Math.random()) + 'px';
                        star.style.height = star.style.width;
                    }
                    if (isTwinkle) {
                        star.style.setProperty('--dur', (2 + Math.random() * 4) + 's');
                        star.style.animationDelay = (Math.random() * 3) + 's';
                    }
                    field.appendChild(star);
                }
            }

            // 渲染金句光点（四角星）
            allQuotes.forEach(function(q, idx) {
                var point = document.createElement('div');
                var tagClass = q.isUser ? '用户' : q.tag;
                point.className = 'light-point alive tag-' + tagClass + (activeTag !== 'all' && q.tag !== activeTag ? ' hidden' : '');
                point.setAttribute('data-id', q.id);

                // 随机大小和位置（用黄金角螺旋分布，避免完全重叠）
                var size = q.isUser ? (10 + Math.random() * 4) : (8 + Math.random() * 6);
                var angle = idx * 2.399963; // golden angle in radians
                var radius = 12 + Math.sqrt(idx) * 8; // spiral outward
                var cx = 50 + radius * Math.cos(angle);
                var cy = 50 + radius * Math.sin(angle);

                // 保持在可见区域
                cx = Math.max(5, Math.min(92, cx));
                cy = Math.max(5, Math.min(92, cy));

                // 加一些随机偏移
                cx += (Math.random() - 0.5) * 8;
                cy += (Math.random() - 0.5) * 8;
                cx = Math.max(3, Math.min(95, cx));
                cy = Math.max(3, Math.min(95, cy));

                point.style.left = cx + '%';
                point.style.top = cy + '%';
                point.style.setProperty('--size', size + 'px');
                point.style.setProperty('--dur', (2.5 + Math.random() * 3.5) + 's');
                point.style.setProperty('--delay', (Math.random() * 4) + 's');

                // 四角星 SVG，颜色按分类
                var starColor = getComputedStyle(document.documentElement).getPropertyValue('--star-' + (q.isUser ? 'user' : tagClass)) || 'rgba(240,235,210,0.9)';
                point.innerHTML = '<svg viewBox="0 0 12 12"><path d="M6,0 L7.2,4.2 L12,6 L7.2,7.8 L6,12 L4.8,7.8 L0,6 L4.8,4.2 Z" fill="' + starColor.trim() + '"/></svg>';

                point.title = '\u70B9\u51FB\u67E5\u770B'; // tooltip

                point.addEventListener('click', function() {
                    openReveal(q.id);
                });

                field.appendChild(point);
            });
        }

        // ==================== 筛选 ====================
        function filterPoints() {
            document.querySelectorAll('.light-point').forEach(function(el) {
                var id = el.getAttribute('data-id');
                var q = allQuotes.find(function(q) { return q.id === id; });
                if (!q) return;
                if (activeTag !== 'all' && q.tag !== activeTag) {
                    el.classList.add('hidden');
                } else {
                    el.classList.remove('hidden');
                }
            });
        }

        // ==================== 打开金句弹窗 ====================
        function openReveal(id) {
            var q = allQuotes.find(function(q) { return q.id === id; });
            if (!q) return;
            currentRevealId = id;

            document.getElementById('revealText').textContent = q.text;
            document.getElementById('revealSource').textContent = '\u2014\u2014 ' + q.source;
            document.getElementById('revealTag').textContent = q.isEasterEgg ? '\u5176\u4ED6' : (q.isUser ? '\u6211\u7684\u8BDD\u8BED' : q.tag);

            if (q.isEasterEgg) {
                showToast('\u{1F38A} \u8FD9\u662F\u4E00\u4E2A\u5F69\u86CB~');
            }
            document.getElementById('revealLikeIcon').innerHTML = q.liked ? '&#9829;' : '&#9825;';
            document.getElementById('revealLikeCount').textContent = q.likes;
            document.getElementById('revealFavIcon').innerHTML = q.fav ? '&#9733;' : '&#9734;';
            document.getElementById('revealDeleteBtn').style.display = q.isUser ? 'block' : 'none';

            var overlay = document.getElementById('quoteRevealOverlay');
            overlay.classList.add('active');
        }

        function closeReveal() {
            document.getElementById('quoteRevealOverlay').classList.remove('active');
            currentRevealId = null;
        }

        document.getElementById('quoteRevealClose').addEventListener('click', closeReveal);
        document.getElementById('quoteRevealOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeReveal();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeReveal();
            }
        });

        // ==================== 弹窗内按钮 ====================
        document.getElementById('revealLikeBtn').addEventListener('click', function() {
            if (!currentRevealId) return;
            var q = allQuotes.find(function(q) { return q.id === currentRevealId; });
            if (!q) return;
            if (q.liked) {
                q.liked = false;
                q.likes = Math.max(0, q.likes - 1);
            } else {
                q.liked = true;
                q.likes += 1;
            }
            var state = loadState();
            if (!state.likes[q.id]) state.likes[q.id] = {};
            state.likes[q.id].liked = q.liked;
            state.likes[q.id].count = q.likes;
            state.likes[q.id].fav = q.fav;
            saveLikes(state.likes);
            document.getElementById('revealLikeIcon').innerHTML = q.liked ? '&#9829;' : '&#9825;';
            document.getElementById('revealLikeCount').textContent = q.likes;
            this.classList.toggle('liked', q.liked);
        });

        document.getElementById('revealFavBtn').addEventListener('click', function() {
            if (!currentRevealId) return;
            var q = allQuotes.find(function(q) { return q.id === currentRevealId; });
            if (!q) return;
            q.fav = !q.fav;
            var state = loadState();
            if (!state.likes[q.id]) state.likes[q.id] = {};
            state.likes[q.id].fav = q.fav;
            saveLikes(state.likes);
            document.getElementById('revealFavIcon').innerHTML = q.fav ? '&#9733;' : '&#9734;';
            showToast(q.fav ? '\u5DF2\u6536\u85CF' : '\u5DF2\u53D6\u6D88\u6536\u85CF');
        });

        document.getElementById('revealDeleteBtn').addEventListener('click', function() {
            if (!currentRevealId) return;
            var delId = currentRevealId;
            allQuotes = allQuotes.filter(function(q) { return q.id !== delId; });
            var uqState = loadState();
            uqState.userQuotes = uqState.userQuotes.filter(function(uq) { return uq.id !== delId; });
            saveUserQuotes(uqState.userQuotes);
            closeReveal();
            renderTags();
            renderField();
            showToast('\u5DF2\u5220\u9664');
        });

        // ==================== 添加话语逻辑 ====================
        document.getElementById('addSubmitBtn').addEventListener('click', function() {
            var textEl = document.getElementById('addQuoteText');
            var sourceEl = document.getElementById('addQuoteSource');
            var tagEl = document.getElementById('addQuoteTag');

            var text = textEl.value.trim();
            if (!text) {
                showToast('\u8BF7\u5148\u5199\u4E0B\u4F60\u7684\u8BDD\u8BED');
                return;
            }

            var source = sourceEl.value.trim() || '\u6211';
            var tag = tagEl.value;
            var id = 'uq_' + Date.now();

                id: id,

        function renderGeniusChecklist() {
            var list = document.getElementById('geniusChecklist');
            list.innerHTML = '';
            var maxReached = selectedGeniuses.length >= 2;

            geniusList.forEach(function(genius) {
                var isSelected = selectedGeniuses.indexOf(genius.id) !== -1;
                var isDisabled = maxReached && !isSelected;

                var item = document.createElement('div');
                item.className = 'choice-item' + (isSelected ? ' selected' : '') + (isDisabled ? ' disabled' : '');
                item.setAttribute('data-id', genius.id);
                item.innerHTML =
                    '<div class="choice-checkbox"></div>' +
                    '<div class="choice-content">' +
                        '<div class="choice-label">' + genius.name + '</div>' +
                        '<div class="choice-desc">' + genius.field + '</div>' +
                    '</div>';
                item.addEventListener('click', function() {
                    if (this.classList.contains('disabled')) {
                        showToast('开发中');
                        return;
                    }
                    toggleGenius(genius.id);
                });
                list.appendChild(item);
            });
        }

        function toggleGenius(id) {
            var idx = selectedGeniuses.indexOf(id);
            if (idx !== -1) {
                // 取消选中
                selectedGeniuses.splice(idx, 1);
            } else {
                // 选中
                if (selectedGeniuses.length >= 2) {
                    showToast('\u6700\u591A\u9009\u62E92\u4F4D\u5929\u624D');
                    return;
                }
                selectedGeniuses.push(id);
            }
            renderGeniusChecklist();
            updateComboButtons();
            // 隐藏展示区
            document.getElementById('dialogueDisplay').classList.remove('active');
            document.getElementById('comboDisplay').classList.remove('active');
        }

        function updateComboButtons() {
            var dialogueBtn = document.getElementById('dialogueBtn');
            var comboBtn = document.getElementById('comboBtn');
            var hint = document.getElementById('comboBtnHint');

            if (selectedGeniuses.length === 0) {
                dialogueBtn.classList.add('btn-disabled');
                comboBtn.classList.add('btn-disabled');
                hint.textContent = '';
            } else if (selectedGeniuses.length === 1) {
                dialogueBtn.classList.add('btn-disabled');
                comboBtn.classList.add('btn-disabled');
                hint.textContent = '';
            } else {
                // 选了2个
                var pairKey = getPairKey(selectedGeniuses);
                var hasDialogue = dialogueData.hasOwnProperty(pairKey);
                var hasCombo = comboData.hasOwnProperty(pairKey);

                if (hasDialogue) {
                    dialogueBtn.classList.remove('btn-disabled');
                } else {
                    dialogueBtn.classList.add('btn-disabled');
                }
                if (hasCombo) {
                    comboBtn.classList.remove('btn-disabled');
                } else {
                    comboBtn.classList.add('btn-disabled');
                }
                hint.textContent = '';
            }

                    '<div class="fav-item-text">' + q.text + '</div>' +
                    '<div class="fav-item-meta">' +
                        '<span class="fav-item-source">' + q.source + '</span>' +
                        '<span class="fav-item-tag">' + (q.isUser ? '我的话语' : q.tag) + '</span>' +
                    '</div>';
                item.addEventListener('click', function() {
                    closeFavPanel();
                    setTimeout(function() { openReveal(q.id); }, 300);
                });
                list.appendChild(item);
            });
        }

        document.getElementById('favPanelBtn').addEventListener('click', openFavPanel);
        document.getElementById('favPanelClose').addEventListener('click', closeFavPanel);
        document.getElementById('favOverlay').addEventListener('click', function(e) {
            if (e.target === this) closeFavPanel();
        });
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (document.getElementById('favOverlay').classList.contains('active')) {
                    closeFavPanel();
                }
            }
        });

        // ==================== 启动 ====================
        init();
        renderGeniusChecklist();
        updateComboButtons();
    </script>
    <script src="_shared/js/animations.js"></script>
</body>
</html>
