<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>天才的遗赠 / Gifts of Genius</title>
    <link rel="stylesheet" href="_shared/css/common.css">
    <style>
        body { padding-top: 60px; }

        .home {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        /* --- Paper texture overlay --- */
        .home-bg {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background:
                radial-gradient(ellipse at 20% 80%, rgba(74, 124, 89, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, rgba(196, 92, 62, 0.05) 0%, transparent 50%),
                var(--paper);
        }
        .home-bg::after {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(139,115,85,0.015) 2px, rgba(139,115,85,0.015) 3px);
            pointer-events: none;
        }

        /* --- Decorative elements --- */
        .home-deco {
            position: absolute;
            pointer-events: none;
        }

        .home-deco-1 {
            top: 8%;
            right: 6%;
            width: 120px;
            height: 400px;
            border-right: 3px solid var(--ink);
            border-radius: 0 50% 50% 0;
            transform: rotate(-5deg);
            opacity: 0.04;
        }

        .home-deco-2 {
            bottom: 12%;
            left: 5%;
            width: 80px;
            height: 250px;
            border-left: 2px solid var(--ink);
            border-radius: 50% 0 0 50%;
            transform: rotate(8deg);
            opacity: 0.04;
        }

        .home-deco-3 {
            top: 20%;
            left: 12%;
            font-size: 6rem;
            color: var(--ink);
            opacity: 0.03;
            font-weight: 900;
            line-height: 1;
            pointer-events: none;
        }

        /* --- Top accent line --- */
        .home-accent {
            position: absolute;
            top: 0; left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--bamboo-light), transparent);
            border-radius: 0 0 2px 2px;
            opacity: 0.5;
        }

        /* --- Content --- */
        .home-content {
            position: relative;
            z-index: 1;
            max-width: 640px;
            padding: 2rem;
        }

        .home h1 {
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            margin-bottom: 0.5rem;
            color: var(--ink);
        }

        .home .subtitle {
            font-size: 1rem;
            color: var(--mist);
            letter-spacing: 0.15em;
            margin-bottom: 1.5rem;
        }

        .home .subtitle-sep {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
            margin-bottom: 2.5rem;
        }
        .home .subtitle-sep::before,
        .home .subtitle-sep::after {
            content: '';
            width: 40px;
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--mist-light));
        }
        .home .subtitle-sep::after {
            background: linear-gradient(90deg, var(--mist-light), transparent);
        }
        .home .subtitle-sep .sep-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
            background: var(--mist-light);
        }

        .home-desc {
            font-size: 1.05rem;
            color: var(--wood);
            line-height: 2;
            margin-bottom: 3rem;
            text-align: justify;
            text-align-last: center;
        }

        /* --- Cards --- */
        .home-cards {
            display: flex;
            gap: 1.5rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .home-card {
            width: 170px;
            padding: 2rem 1.2rem 1.5rem;
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(139, 115, 85, 0.25);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-decoration: none;
            color: var(--ink);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(139, 115, 85, 0.08);
        }
        .home-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--bamboo-light), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .home-card:hover::before {
            opacity: 0.6;
        }

        .home-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 16px 48px rgba(139, 115, 85, 0.18);
            border-color: var(--bamboo-light);
            background: rgba(255, 255, 255, 0.95);
        }

        .home-card .icon {
            font-size: 2.6rem;
            margin-bottom: 1rem;
            opacity: 0.7;
            transition: transform 0.4s, opacity 0.3s;
        }
        .home-card:hover .icon {
            transform: scale(1.15);
            opacity: 0.9;
        }

        .home-card h3 {
            font-size: 1rem;
            letter-spacing: 0.12em;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .home-card p {
            font-size: 0.75rem;
            color: var(--mist);
            text-align: center;
            line-height: 1.7;
        }

        @media (max-width: 768px) {
            .home h1 { font-size: 2rem; }
            .home-card { width: 150px; padding: 1.5rem 1rem 1.2rem; }
        }
        @media (max-width: 480px) {
            .home-cards { gap: 1rem; }
            .home-card { width: 100%; max-width: 260px; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="nav-brand">天才的遗赠 <small>Gifts of Genius</small></a>
        <div class="nav-links">
            <a href="index.html" id="nav-home" class="active">首页</a>
            <a href="explore.html" id="nav-explore">探索</a>
            <a href="dialogue.html" id="nav-dialogue">对话</a>
            <a href="decision.html" id="nav-decision">决策测试</a>
        </div>
    </nav>

    <div class="home">
        <div class="home-bg"></div>
        <div class="home-accent"></div>
        <div class="home-deco home-deco-1"></div>
        <div class="home-deco home-deco-2"></div>
        <div class="home-deco home-deco-3">道</div>
        <div class="home-content">
            <h1 class="animate-once fade-in-up">天才的遗赠</h1>
            <p class="subtitle animate-once fade-in-up animate-delay-100">GIFTS OF GENIUS</p>
            <div class="subtitle-sep animate-once fade-in animate-delay-200">
                <span class="sep-dot"></span>
            </div>
            <p class="home-desc animate-once fade-in-up animate-delay-200">
                在不确定的世界中，每个人都在做出决策。而历史上那些顶尖的思想者——庄子、王阳明、维特根斯坦、马克思……他们面对人生重大抉择时的价值取向，至今仍在回响。探索他们的精神遗产，在对话中触摸他们的决策逻辑，发现你与哪位天才在价值观深处共鸣。
            </p>
            <div class="home-cards animate-stagger animate-on-scroll">
                <a href="explore.html" class="home-card animate-stagger-item">
                    <div class="icon">&#127807;</div>
                    <h3>探索</h3>
                    <p>走进天才们的精神空间，或遨游于自由空间</p>
                </a>
                <a href="dialogue.html" class="home-card animate-stagger-item">
                    <div class="icon">&#128172;</div>
                    <h3>对话</h3>
                    <p>在关键情境中与天才们的灵魂对谈，理解他们的选择</p>
                </a>
                <a href="decision.html" class="home-card animate-stagger-item">
                    <div class="icon">&#9878;&#65039;</div>
                    <h3>决策测试</h3>
                    <p>面对天才们曾面临的抉择，测试你们的价值观共鸣度</p>
                </a>
            </div>
        </div>
    </div>
    <script src="_shared/js/animations.js"></script>
</body>
</html>
