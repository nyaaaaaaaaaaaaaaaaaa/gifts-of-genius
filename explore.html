<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>探索 / 天才的遗赠</title>
    <link rel="stylesheet" href="_shared/css/common.css">
    <style>
        body { padding-top: 60px; }

        .explore {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .explore-bg {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background:
                radial-gradient(ellipse at 30% 70%, rgba(74, 124, 89, 0.07) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 30%, rgba(196, 92, 62, 0.05) 0%, transparent 50%),
                var(--paper);
        }

        .explore-deco {
            position: absolute;
            pointer-events: none;
            opacity: 0.04;
        }

        .explore-deco-1 {
            top: 10%;
            right: 8%;
            width: 100px;
            height: 350px;
            border-right: 2px solid var(--ink);
            border-radius: 0 50% 50% 0;
            transform: rotate(-6deg);
        }

        .explore-deco-2 {
            bottom: 15%;
            left: 6%;
            width: 70px;
            height: 220px;
            border-left: 2px solid var(--ink);
            border-radius: 50% 0 0 50%;
            transform: rotate(7deg);
        }

        .explore-content {
            position: relative;
            z-index: 1;
            max-width: 700px;
            padding: 2rem;
        }

        .explore h1 {
            font-size: 2.6rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            margin-bottom: 0.5rem;
            color: var(--ink);
        }

        .explore .subtitle {
            font-size: 0.95rem;
            color: var(--mist);
            letter-spacing: 0.15em;
            margin-bottom: 3rem;
        }

        .explore-cards {
            display: flex;
            gap: 2rem;
            justify-content: center;
            flex-wrap: wrap;
        }

        .explore-card {
            width: 280px;
            padding: 2.5rem 2rem;
            background: rgba(255, 255, 255, 0.82);
            border: 1px solid rgba(139, 115, 85, 0.25);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            text-decoration: none;
            color: var(--ink);
            position: relative;
            overflow: hidden;
            box-shadow: 0 4px 20px rgba(139, 115, 85, 0.08);
        }
        .explore-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 3px;
            background: linear-gradient(90deg, transparent, var(--bamboo-light), transparent);
            opacity: 0;
            transition: opacity 0.4s;
        }
        .explore-card:hover::before {
            opacity: 0.6;
        }

        .explore-card:hover {
            transform: translateY(-12px);
            box-shadow: 0 16px 48px rgba(139, 115, 85, 0.18);
            border-color: var(--bamboo-light);
            background: rgba(255, 255, 255, 0.95);
        }

        .explore-card .icon {
            font-size: 3rem;
            margin-bottom: 1.5rem;
            opacity: 0.85;
            filter: brightness(1.4) saturate(0.8);
            text-shadow: 0 0 16px rgba(255, 255, 255, 0.25);
            transition: transform 0.4s, opacity 0.3s, filter 0.3s;
        }
        .explore-card:hover .icon {
            transform: scale(1.15);
            opacity: 1;
            filter: brightness(1.6) saturate(0.9);
        }

        .explore-card h3 {
            font-size: 1.15rem;
            letter-spacing: 0.12em;
            margin-bottom: 1rem;
            font-weight: 700;
        }

        .explore-card p {
            font-size: 0.85rem;
            color: var(--mist);
            line-height: 1.8;
            text-align: center;
        }

        @media (max-width: 768px) {
            .explore h1 { font-size: 2rem; }
            .explore-card { width: 240px; padding: 2rem 1.5rem; }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="nav-brand">天才的遗赠 <small>Gifts of Genius</small></a>
        <div class="nav-links">
            <a href="index.html" id="nav-home">首页</a>
            <a href="explore.html" id="nav-explore" class="active">探索</a>
            <a href="dialogue.html" id="nav-dialogue">对话</a>
            <a href="decision.html" id="nav-decision">决策测试</a>
        </div>
    </nav>

    <div class="explore">
        <div class="explore-bg"></div>
        <div class="explore-deco explore-deco-1"></div>
        <div class="explore-deco explore-deco-2"></div>
        <div class="explore-content">
            <h1 class="animate-once fade-in-up">探索</h1>
            <p class="subtitle animate-once fade-in-up animate-delay-100">选择你的探索方式</p>
            <div class="explore-cards animate-stagger animate-on-scroll">
                <a href="explore-genius.html" class="explore-card animate-stagger-item">
                    <div class="icon">&#127956;&#65039;</div>
                    <h3>特定人物</h3>
                    <p>走进天才的精神空间，探索象征其决策智慧的场景与遗物</p>
                </a>
                <a href="freedom.html" class="explore-card animate-stagger-item">
                    <div class="icon">&#10024;</div>
                    <h3>自由空间</h3>
                    <p>遨游于星空之中，点亮智慧的星辰，探索跨时空的思想碰撞</p>
                </a>
            </div>
        </div>
    </div>
    <script src="_shared/js/animations.js"></script>
</body>
</html>
