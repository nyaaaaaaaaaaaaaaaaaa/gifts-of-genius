<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>对话 - 天才的遗赠 / Gifts of Genius</title>
    <link rel="stylesheet" href="_shared/css/common.css">
    <style>
        body { padding-top: 60px; }

        /* === 页面整体布局 === */
        .dialogue-page {
            display: flex;
            flex-direction: column;
            min-height: calc(100vh - 60px);
            background: linear-gradient(180deg, #e6e0d2 0%, #ddd6c8 100%);
        }

        /* === 顶部时间线 === */
        .dialogue-timeline {
            padding: 1rem 2rem 0.5rem;
            border-bottom: 1px solid rgba(139, 115, 85, 0.12);
            background: rgba(255, 255, 255, 0.3);
            position: relative;
        }
        .dialogue-timeline-label {
            font-size: 0.7rem;
            color: var(--mist);
            letter-spacing: 0.15em;
            margin-bottom: 0.5rem;
            text-align: center;
        }
        .timeline-track {
            display: flex;
            align-items: center;
            gap: 0;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 0.3rem 0.5rem;
            scrollbar-width: thin;
            scrollbar-color: rgba(139, 115, 85, 0.2) transparent;
            justify-content: center;
        }
        .timeline-track::-webkit-scrollbar { height: 3px; }
        .timeline-track::-webkit-scrollbar-track { background: transparent; }
        .timeline-track::-webkit-scrollbar-thumb { background: rgba(139, 115, 85, 0.25); border-radius: 2px; }

        .timeline-node {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 0.25rem;
            cursor: pointer;
            padding: 0.4rem 1rem;
            border-radius: 8px;
            transition: all 0.3s;
            position: relative;
        }
        .timeline-node::before {
            content: '';
            width: 8px;
            height: 8px;
            border-radius: 50%;
            border: 1.5px solid #c4a55a;
            background: #c4a55a;
            box-shadow: 0 0 6px rgba(196, 165, 90, 0.3);
            transition: all 0.3s;
            flex-shrink: 0;
        }
        .timeline-node.active::before {
            background: #d4b96a;
            border-color: #d4b96a;
            box-shadow: 0 0 10px rgba(212, 185, 106, 0.5);
            width: 10px;
            height: 10px;
        }
        .timeline-node:hover:not(.active):not(.disabled)::before {
            border-color: #d4b96a;
            background: #d4b96a;
            box-shadow: 0 0 8px rgba(212, 185, 106, 0.4);
        }
        .timeline-year {
            font-size: 0.65rem;
            color: rgba(139, 115, 85, 0.4);
            letter-spacing: 0.03em;
            white-space: nowrap;
            transition: color 0.3s;
        }
        .timeline-node.active .timeline-year { color: var(--bamboo); font-weight: 700; }
        .timeline-title {
            font-size: 0.7rem;
            color: rgba(139, 115, 85, 0.55);
            white-space: nowrap;
            transition: color 0.3s;
        }
        .timeline-node.active .timeline-title { color: var(--ink); font-weight: 700; }

        /* 无对话节点 - 空心淡色 */
        .timeline-node.disabled {
            opacity: 1;
            cursor: pointer;
        }
        .timeline-node.disabled::before {
            background: transparent;
            border: 1.5px solid rgba(139, 115, 85, 0.4);
            border-style: solid;
            box-shadow: none;
        }
        .timeline-node.disabled:hover:not(.active)::before {
            border-color: rgba(139, 115, 85, 0.65);
            box-shadow: none;
        }
        /* === 右上角人物图鉴按钮 === */
        .character-gallery-btn {
            position: fixed;
            top: 70px;
            right: 1.5rem;
            z-index: 100;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(139, 115, 85, 0.25);
            color: #8b7355;
            font-size: 1.1rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            line-height: 1;
        }
        .character-gallery-btn:hover {
            background: rgba(196, 165, 90, 0.15);
            border-color: rgba(196, 165, 90, 0.4);
            transform: scale(1.05);
        }

        /* === 人物图鉴面板（居中modal） === */
        .character-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(4px);
            z-index: 2000;
            opacity: 0;
            transition: opacity 0.35s ease;
        }
        .character-overlay.active {
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 1;
        }
        .character-panel {
            position: relative;
            width: 90%;
            max-width: 520px;
            max-height: 80vh;
            background: linear-gradient(135deg, rgba(44, 44, 44, 0.98), rgba(50, 50, 55, 0.98));
            border: 1px solid rgba(196, 165, 90, 0.15);
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            transform: scale(0.9);
            opacity: 0;
            transition: transform 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94), opacity 0.4s;
            display: flex;
            flex-direction: column;
        }
        .character-overlay.active .character-panel {
            transform: scale(1);
            opacity: 1;
        }
        .character-panel-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1.5rem 1.2rem 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .character-panel-header h2 {
            font-size: 1rem;
            letter-spacing: 0.2em;
            color: #c4bfb6;
        }
        .character-panel-close {
            background: none;
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 50%;
            width: 32px;
            height: 32px;
            font-size: 1.1rem;
            cursor: pointer;
            color: #9e9a94;
            transition: all 0.3s;
            padding: 0;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .character-panel-close:hover {
            background: rgba(255,255,255,0.08);
            color: #e0ddd6;
            border-color: rgba(255,255,255,0.3);
        }
        .character-list {
            flex: 1;
            overflow-y: auto;
            padding: 0.6rem 0;
        }
        .character-card {
            padding: 0.85rem 1.2rem;
            cursor: default;
            border-left: 3px solid transparent;
            transition: background 0.3s, border-color 0.3s;
        }
        .character-card:hover {
            background: rgba(255,255,255,0.04);
        }
        .character-card.active {
            background: rgba(74, 124, 89, 0.15);
            border-left-color: var(--bamboo-light);
        }
        .card-top {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            margin-bottom: 0.45rem;
        }
        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            flex-shrink: 0;
            object-fit: cover;
            background: #4a4a4a;
        }
        .avatar-text {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            font-weight: 700;
            color: #f5f0e8;
        }
        .card-info { flex: 1; min-width: 0; }
        .card-name {
            font-size: 0.95rem;
            font-weight: 700;
            color: #f0ece4;
            letter-spacing: 0.05em;
        }
        .card-field {
            font-size: 0.72rem;
            color: #8a8580;
            margin-top: 0.1rem;
        }
        .card-desc {
            font-size: 0.78rem;
            color: #a09a92;
            line-height: 1.6;
            margin-bottom: 0.15rem;
        }
        .card-era {
            font-size: 0.7rem;
            color: #6b6762;
            margin-bottom: 0.5rem;
        }
        .card-actions {
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }
        .like-btn {
            background: none;
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 0.2rem 0.65rem;
            font-size: 0.8rem;
            color: #9e9a94;
            cursor: pointer;
            transition: all 0.3s;
            font-family: inherit;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        .like-btn:hover {
            border-color: var(--accent-soft);
            color: var(--accent-soft);
        }
        .like-btn.liked {
            border-color: var(--accent);
            color: var(--accent);
        }
        .like-btn .heart {
            font-style: normal;
        }
        .enter-dialogue-btn {
            background: rgba(74, 124, 89, 0.2);
            border: 1px solid rgba(74, 124, 89, 0.3);
            border-radius: 20px;
            padding: 0.2rem 0.65rem;
            font-size: 0.75rem;
            color: #6b9e7c;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.3s;
            font-family: inherit;
        }
        .enter-dialogue-btn:hover {
            background: rgba(74, 124, 89, 0.35);
        }

        /* === 对话区域 === */
        .dialogue-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            position: relative;
            background-size: cover;
            background-position: center;
            transition: background-image 0.8s ease;
        }
        .dialogue-area::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(180deg, rgba(255,252,245,0.88) 0%, rgba(255,252,245,0.92) 50%, rgba(255,252,245,0.88) 100%);
            z-index: 0;
        }
        .dialogue-area > * {
            position: relative;
            z-index: 1;
        }
        .dialogue-header {
            text-align: center;
            padding: 1.5rem 2rem 1rem;
        }
        .dialogue-title {
            font-size: 1.4rem;
            font-weight: 700;
            letter-spacing: 0.15em;
            color: var(--ink);
        }
        .dialogue-meta {
            font-size: 0.82rem;
            color: var(--mist);
            margin-top: 0.4rem;
            letter-spacing: 0.08em;
        }

        .dialogue-scene {
            flex: 1;
            display: flex;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
            padding: 1rem 2rem 2rem;
            gap: 2rem;
            align-items: flex-end;
        }

        .zhuangzi-figure {
            width: 300px;
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-end;
        }
        .zhuangzi-figure img {
            width: 280px;
            height: auto;
            max-height: 420px;
            object-fit: contain;
            object-position: center bottom;
        }
        .figure-name {
            margin-top: 1rem;
            font-size: 0.85rem;
            letter-spacing: 0.2em;
            color: var(--mist);
        }

        .dialogue-panel {
            flex: 1;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 16px;
            padding: 1.8rem;
            border: 1px solid rgba(139, 115, 85, 0.12);
            min-height: 400px;
            display: flex;
            flex-direction: column;
            backdrop-filter: blur(6px);
        }
        .dialogue-history {
            flex: 1;
            overflow-y: auto;
            margin-bottom: 1.5rem;
            padding-right: 0.5rem;
        }
        .dialogue-msg {
            margin-bottom: 1.2rem;
            animation: fadeInUp 0.4s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .dialogue-msg.zhuangzi .msg-bubble {
            background: rgba(74, 124, 89, 0.06);
            border-left: 3px solid var(--bamboo);
            padding: 1rem 1.2rem;
            border-radius: 0 12px 12px 12px;
        }
        .dialogue-msg.user .msg-bubble {
            background: rgba(196, 92, 62, 0.05);
            border-right: 3px solid var(--accent-soft);
            padding: 1rem 1.2rem;
            border-radius: 12px 0 12px 12px;
            text-align: right;
        }
        .dialogue-msg.system .msg-bubble {
            background: rgba(139, 115, 85, 0.04);
            border: 1px dashed rgba(139, 115, 85, 0.12);
        }
        .msg-bubble p {
            font-size: 0.95rem;
            line-height: 1.8;
            color: var(--ink);
        }
        .msg-source {
            font-size: 0.75rem;
            color: var(--mist);
            margin-top: 0.5rem;
            font-style: italic;
        }
        .dialogue-choices {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
        }

        /* History toggle button - inside dialogue panel */
        .history-toggle-btn {
            position: absolute;
            top: 0.8rem;
            right: 0.8rem;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.4);
            border: 1px solid rgba(139, 115, 85, 0.15);
            color: var(--ink);
            font-size: 0.85rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 10;
            opacity: 0.5;
        }
        .history-toggle-btn:hover {
            opacity: 1;
            background: rgba(255, 255, 255, 0.7);
        }
        .history-toggle-btn.has-history {
            opacity: 0.8;
        }
        .dialogue-panel {
            position: relative;
        }
        /* When showing full history, dim old messages */
        .dialogue-history.show-all .dialogue-msg {
            opacity: 1;
        }
        .dialogue-history:not(.show-all) .dialogue-msg.prev-msg {
            display: none;
        }
        .choice-btn {
            padding: 1rem 1.2rem;
            background: rgba(245, 240, 232, 0.9);
            border: 1px solid rgba(139, 115, 85, 0.2);
            border-radius: 10px;
            cursor: pointer;
            text-align: left;
            font-family: inherit;
            font-size: 0.9rem;
            color: var(--ink);
            transition: all 0.3s;
            line-height: 1.6;
        }
        .choice-btn:hover {
            background: rgba(74, 124, 89, 0.1);
            border-color: var(--bamboo-light);
            transform: translateX(4px);
        }

        @media (max-width: 900px) {
            .dialogue-scene {
                padding: 1rem;
                gap: 1rem;
            }
            .character-panel {
                max-width: 95%;
            }
        }
        @media (max-width: 600px) {
            .dialogue-scene {
                flex-direction: column;
                align-items: center;
                padding: 0.5rem 1rem 1rem;
            }
            .zhuangzi-figure {
                width: 120px;
                margin-bottom: 0.5rem;
            }
            .zhuangzi-figure img {
                width: 120px;
                height: auto;
                max-height: 180px;
            }
            .dialogue-panel {
                padding: 1.2rem;
            }
            .dialogue-timeline {
                padding: 0.8rem 1rem 0.5rem;
            }
            .timeline-node {
                padding: 0.3rem 0.6rem;
            }
            .timeline-title {
                font-size: 0.65rem;
            }
            .character-gallery-btn {
                top: 66px;
                right: 1rem;
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <a href="index.html" class="nav-brand">天才的遗赠 <small>Gifts of Genius</small></a>
        <div class="nav-links">
            <a href="index.html">首页</a>
            <a href="explore.html">探索</a>
            <a href="dialogue.html" class="active">对话</a>
            <a href="decision.html">决策测试</a>
        </div>
    </nav>

    <div class="dialogue-page">
        <!-- 人物图鉴按钮 -->
        <button class="character-gallery-btn" id="galleryBtn" title="人物图鉴">&#9783;</button>

        <!-- 顶部时间线 -->
        <div class="dialogue-timeline">
            <div class="dialogue-timeline-label">人生节点 · 选择对话场景</div>
            <div class="timeline-track" id="timelineTrack">
                <!-- 由JS生成 -->
            </div>
        </div>

        <!-- 对话区域 -->
        <div class="dialogue-area" id="dialogueArea">
            <div class="dialogue-header">
                <div class="dialogue-title" id="dialogueTitle">拒聘楚相</div>
                <div class="dialogue-meta" id="dialogueMeta">约公元前335年 · 濮水之畔 · 楚王遣使聘庄子为相</div>
            </div>
            <div class="dialogue-scene">
                <div class="zhuangzi-figure">
                    <img src="assets/portraits/zhuangzi_transparent.png" alt="庄子">
                    <div class="figure-name">庄子</div>
                </div>
                <div class="dialogue-panel">
                    <button class="history-toggle-btn" id="history-toggle-btn" title="查看对话记录">&#8634;</button>
                    <div class="dialogue-history" id="dialogue-history"></div>
                    <div class="dialogue-choices" id="dialogue-choices"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- 人物图鉴（居中modal） -->
    <div class="character-overlay" id="characterOverlay">
        <div class="character-panel" id="characterPanel">
            <div class="character-panel-header">
                <h2>人物图鉴</h2>
                <button class="character-panel-close" id="panelClose">&times;</button>
            </div>
            <div class="character-list" id="characterList"></div>
        </div>
    </div>

    <script>
        /* ========== 人物数据 ========== */
        var characters = [
            { id: 'zhuangzi', name: '庄子', field: '道家哲学', era: '约前369—前286年', desc: '逍遥游于天地之间，以寓言丈量自由的边界', img: 'assets/avatars/zhuangzi.jpg', dialogueAvailable: true },
            { id: 'wangyangming', name: '王阳明', field: '心学哲学', era: '1472—1529年', desc: '知行合一，龙场悟道照亮心学之路', img: 'assets/avatars/wang-yangming.jpg', dialogueAvailable: false },
            { id: 'wittgenstein', name: '维特根斯坦', field: '分析哲学', era: '1889—1951年', desc: '语言的边界就是世界的边界', img: 'assets/avatars/wittgenstein.jpg', dialogueAvailable: false },
            { id: 'marx', name: '马克思', field: '政治经济学', era: '1818—1883年', desc: '哲学家们只是用不同的方式解释世界，问题在于改变世界', img: 'assets/avatars/marx.jpg', dialogueAvailable: false },
            { id: 'feynman', name: '费曼', field: '理论物理', era: '1918—1988年', desc: '如果你觉得你懂了量子力学，那你就没懂', img: 'assets/avatars/feynman.jpg', dialogueAvailable: false },
            { id: 'schrodinger', name: '薛定谔', field: '量子物理', era: '1887—1961年', desc: '在确定与不确定之间，猫同时活着和死去', img: 'assets/avatars/schrodinger.jpg', dialogueAvailable: false },
            { id: 'jung', name: '荣格', field: '分析心理学', era: '1875—1961年', desc: '向外看的人在做梦，向内看的人在觉醒', img: 'assets/avatars/jung.jpg', dialogueAvailable: false },
            { id: 'rousseau', name: '卢梭', field: '启蒙哲学', era: '1712—1778年', desc: '人生而自由，却无往不在枷锁之中', img: 'assets/avatars/rousseau.jpg', dialogueAvailable: false }
        ];

        /* ========== 喜欢状态管理 ========== */
        var LIKES_KEY = 'gifts_of_genius_likes';
        function getLikes() {
            try {
                var data = localStorage.getItem(LIKES_KEY);
                return data ? JSON.parse(data) : {};
            } catch(e) {
                return {};
            }
        }
        function setLike(id) {
            var likes = getLikes();
            likes[id] = !likes[id];
            try { localStorage.setItem(LIKES_KEY, JSON.stringify(likes)); } catch(e) {}
            return likes[id];
        }
        function isLiked(id) {
            return !!getLikes()[id];
        }

        /* ========== 头像颜色 ========== */
        var avatarColors = ['#d8c8b8', '#a8c8c8', '#c8c8d8', '#d8c0b0', '#b0c8d8', '#d8d0c0', '#c0d0c0', '#d8c0d0'];

        /* ========== 渲染人物图鉴 ========== */
        function renderCharacterList() {
            var list = document.getElementById('characterList');
            var likes = getLikes();
            list.innerHTML = '';

            characters.forEach(function(ch, idx) {
                var card = document.createElement('div');
                card.className = 'character-card' + (ch.dialogueAvailable ? ' active' : '');

                var avatarHtml = '';
                if (ch.img) {
                    avatarHtml = '<img class="avatar" src="' + ch.img + '" alt="' + ch.name + '">';
                } else {
                    var bgColor = avatarColors[idx % avatarColors.length];
                    avatarHtml = '<span class="avatar-text" style="background:' + bgColor + '">' + ch.name.charAt(0) + '</span>';
                }

                var likeClass = likes[ch.id] ? ' liked' : '';
                var heartChar = likes[ch.id] ? '♥' : '♡';

                var dialogueBtnHtml = '';
                if (ch.dialogueAvailable) {
                    dialogueBtnHtml = '<a href="dialogue.html" class="enter-dialogue-btn">进入对话</a>';
                }

                card.innerHTML =
                    '<div class="card-top">' +
                        avatarHtml +
                        '<div class="card-info">' +
                            '<div class="card-name">' + ch.name + '</div>' +
                            '<div class="card-field">' + ch.field + '</div>' +
                        '</div>' +
                    '</div>' +
                    '<div class="card-desc">' + ch.desc + '</div>' +
                    '<div class="card-era">' + ch.era + '</div>' +
                    '<div class="card-actions">' +
                        '<button class="like-btn' + likeClass + '" data-id="' + ch.id + '">' +
                            '<span class="heart">' + heartChar + '</span> 喜欢' +
                        '</button>' +
                        dialogueBtnHtml +
                    '</div>';

                list.appendChild(card);
            });

            list.querySelectorAll('.like-btn').forEach(function(btn) {
                btn.addEventListener('click', function() {
                    var id = this.getAttribute('data-id');
                    var liked = setLike(id);
                    var heart = this.querySelector('.heart');
                    if (liked) {
                        this.classList.add('liked');
                        heart.textContent = '♥';
                    } else {
                        this.classList.remove('liked');
                        heart.textContent = '♡';
                    }
                });
            });
        }

        /* ========== 时间线数据 ========== */

        /* ========== 获取当前对话树 ========== */
        function getCurrentTree() {
            return dialogueScenes[currentSceneId] ? dialogueScenes[currentSceneId].tree : null;
        }

        /* ========== 对话逻辑 ========== */
        var currentDialogue = 'start';

        function renderDialogue() {
            var tree = getCurrentTree();
            if (!tree) return;
            var node = tree[currentDialogue];
            if (!node) return;

            var history = document.getElementById('dialogue-history');
            var choices = document.getElementById('dialogue-choices');

            /* Mark all existing messages as prev (hidden by default) */
            history.querySelectorAll('.dialogue-msg').forEach(function(msg) {
                msg.classList.add('prev-msg');
            });
            /* Remove show-all mode when new message arrives */
            history.classList.remove('show-all');

            var msgDiv = document.createElement('div');
            msgDiv.className = 'dialogue-msg ' + node.speaker;

            var sourceHtml = node.source ? '<div class="msg-source">' + node.source + '</div>' : '';
            msgDiv.innerHTML = '<div class="msg-bubble"><p>' + node.text + '</p>' + sourceHtml + '</div>';
            history.appendChild(msgDiv);
            history.scrollTop = history.scrollHeight;

            /* Update history toggle button state */
            updateHistoryBtn();

            choices.innerHTML = '';
            if (node.choices.length === 0) {
                var restartBtn = document.createElement('button');
                restartBtn.className = 'choice-btn';
                restartBtn.textContent = '重新开始本次对话';
                restartBtn.addEventListener('click', function() {
                    history.innerHTML = '';
                    history.classList.remove('show-all');
                    var toggleBtn = document.getElementById('history-toggle-btn');
                    toggleBtn.innerHTML = '&#8634;';
                    toggleBtn.title = '查看对话记录';
                    currentDialogue = 'start';
                    renderDialogue();
                });
                choices.appendChild(restartBtn);
            } else {
                node.choices.forEach(function(choice) {
                    var btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    btn.textContent = choice.text;
                    btn.addEventListener('click', function() {
                        /* Mark latest msg as prev before showing user choice */
                        history.querySelectorAll('.dialogue-msg:not(.prev-msg)').forEach(function(msg) {
                            msg.classList.add('prev-msg');
                        });
                        history.classList.remove('show-all');

                        var userMsg = document.createElement('div');
                        userMsg.className = 'dialogue-msg user';
                        userMsg.innerHTML = '<div class="msg-bubble"><p>' + choice.text + '</p></div>';
                        history.appendChild(userMsg);
                        history.scrollTop = history.scrollHeight;

                        currentDialogue = choice.next;
                        setTimeout(renderDialogue, 600);
                    });
                    choices.appendChild(btn);
                });
            }
        }

        /* ========== 时间线渲染 ========== */
        function renderTimeline() {
            var track = document.getElementById('timelineTrack');
            var html = '';
            timelineEvents.forEach(function(ev, idx) {
                var isActive = ev.id === currentSceneId;
                var available = ev.available && dialogueScenes[ev.id];
                var nodeClass = 'timeline-node' + (isActive ? ' active' : '') + (available ? '' : ' disabled');
                html += '<div class="' + nodeClass + '" data-id="' + ev.id + '" title="' + ev.meta + '">' +
                    '<div class="timeline-year">' + ev.year + '</div>' +
                    '<div class="timeline-title">' + ev.title + '</div>' +
                    '</div>';
            });
            track.innerHTML = html;

            track.querySelectorAll('.timeline-node').forEach(function(n) {
                n.addEventListener('click', function() {
                    var id = this.getAttribute('data-id');
                    // 切换active样式
                    track.querySelectorAll('.timeline-node').forEach(function(node) {
                        node.classList.remove('active');
                    });
                    this.classList.add('active');

                    if (dialogueScenes[id]) {
                        // 有对话：正常切换场景
                        switchScene(id);
                    } else {
                        // 无对话：显示介绍
                        showIntro(id);
                    }
                });
            });
        }

        /* ========== 切换对话场景 ========== */
        function switchScene(sceneId) {
            if (!dialogueScenes[sceneId]) return;
            currentSceneId = sceneId;
            currentDialogue = 'start';

            var scene = dialogueScenes[sceneId];
            document.getElementById('dialogueTitle').textContent = scene.title;
            document.getElementById('dialogueMeta').textContent = scene.meta;

            var area = document.getElementById('dialogueArea');
            if (scene.background) {
                area.style.backgroundImage = 'url(' + scene.background + ')';
            }

            var history = document.getElementById('dialogue-history');
            history.innerHTML = '';
            history.classList.remove('show-all');
            var toggleBtn = document.getElementById('history-toggle-btn');
            toggleBtn.innerHTML = '&#8634;';
            toggleBtn.title = '查看对话记录';
            document.getElementById('dialogue-choices').innerHTML = '';

            renderTimeline();
            setTimeout(renderDialogue, 200);
        }

        /* ========== 显示节点介绍（无对话时） ========== */
        function showIntro(nodeId) {
            var ev = timelineEvents.find(function(e) { return e.id === nodeId; });
            if (!ev || !ev.intro) return;

            currentSceneId = nodeId;
            document.getElementById('dialogueTitle').textContent = ev.title;
            document.getElementById('dialogueMeta').textContent = ev.meta;

            document.getElementById('dialogueArea').style.backgroundImage = 'url(assets/scenes/dream-butterfly.jpg)';

            var history = document.getElementById('dialogue-history');
            var choices = document.getElementById('dialogue-choices');
            history.innerHTML = '';
            history.classList.remove('show-all');
            var toggleBtn = document.getElementById('history-toggle-btn');
            toggleBtn.innerHTML = '&#8634;';
            toggleBtn.title = '查看对话记录';
            choices.innerHTML = '';

            var introMsg = document.createElement('div');
            introMsg.className = 'dialogue-msg zhuangzi';
            introMsg.innerHTML = '<div class="msg-bubble"><p>' + ev.intro + '</p></div>';
            history.appendChild(introMsg);

            var notice = document.createElement('div');
            notice.className = 'dialogue-msg system';
            notice.innerHTML = '<div class="msg-bubble"><p style="font-size:0.8rem;color:var(--mist)">该场景的对话正在筹备中，敬请期待</p></div>';
            history.appendChild(notice);
        }

        /* ========== 人物图鉴面板 ========== */
        var galleryBtn = document.getElementById('galleryBtn');
        var panelClose = document.getElementById('panelClose');
        var characterPanel = document.getElementById('characterPanel');
        var characterOverlay = document.getElementById('characterOverlay');

        function openGallery() {
            characterOverlay.classList.add('active');
        }

        function closeGallery() {
            characterOverlay.classList.remove('active');
        }

        galleryBtn.addEventListener('click', openGallery);
        panelClose.addEventListener('click', closeGallery);
        characterOverlay.addEventListener('click', function(e) {
            if (e.target === this) closeGallery();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                if (characterOverlay.classList.contains('active')) {
                    closeGallery();
                }
            }
        });

        /* ========== 历史回顾按钮 ========== */
        function updateHistoryBtn() {
            var history = document.getElementById('dialogue-history');
            var btn = document.getElementById('history-toggle-btn');
            var prevCount = history.querySelectorAll('.dialogue-msg.prev-msg').length;
            btn.classList.toggle('has-history', prevCount > 0);
        }

        document.getElementById('history-toggle-btn').addEventListener('click', function() {
            var history = document.getElementById('dialogue-history');
            var prevCount = history.querySelectorAll('.dialogue-msg.prev-msg').length;

            if (prevCount === 0) {
                /* No history yet — show a brief hint */
                var existingHint = history.querySelector('.history-empty-hint');
                if (existingHint) { existingHint.remove(); return; }
                var hint = document.createElement('div');
                hint.className = 'dialogue-msg system history-empty-hint';
                hint.innerHTML = '<div class="msg-bubble"><p style="font-size:0.8rem;color:var(--mist)">暂无更多对话记录</p></div>';
                history.appendChild(hint);
                history.scrollTop = history.scrollHeight;
                setTimeout(function() { hint.remove(); }, 2000);
                return;
            }

            var isShowingAll = history.classList.toggle('show-all');
            this.innerHTML = isShowingAll ? '&#10005;' : '&#8634;';
            this.title = isShowingAll ? '收起对话记录' : '查看对话记录';
            history.scrollTop = history.scrollHeight;
        });

        /* ========== 初始化 ========== */
        var initScene = dialogueScenes[currentSceneId];
        if (initScene && initScene.background) {
            document.getElementById('dialogueArea').style.backgroundImage = 'url(' + initScene.background + ')';
        }
        renderCharacterList();
        renderTimeline();
        renderDialogue();
    </script>
